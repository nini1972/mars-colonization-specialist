services:
  dashboard:
    build: .
    image: mars-agent:latest
    command: ["python", "-m", "mars_agent.dashboard"]
    ports:
      - "${DASHBOARD_PORT:-8000}:8000"
    volumes:
      - mars_data:/data
    environment:
      DASHBOARD_HOST: "0.0.0.0"
      DASHBOARD_PORT: "8000"
      MARS_MCP_PERSISTENCE_BACKEND: "${MARS_MCP_PERSISTENCE_BACKEND:-sqlite}"
      MARS_MCP_PERSISTENCE_SQLITE_PATH: "/data/mars_mcp_runtime.sqlite3"
      MARS_MCP_AUTH_ENABLED: "${MARS_MCP_AUTH_ENABLED:-false}"
      MARS_MCP_AUTH_TOKEN: "${MARS_MCP_AUTH_TOKEN:-}"
      MARS_MCP_AUTH_PERMISSIONS: "${MARS_MCP_AUTH_PERMISSIONS:-}"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      MARS_LLM_ORCHESTRATOR_ENABLED: "${MARS_LLM_ORCHESTRATOR_ENABLED:-false}"
      MARS_DEV_FAIL_SPECIALIST: "${MARS_DEV_FAIL_SPECIALIST:-}"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

volumes:
  mars_data:
