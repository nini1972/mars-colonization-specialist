name: CI

on:
  push:
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]

      - name: Lint
        run: python -m ruff check .

      - name: Type check
        run: python -m mypy src tests

      - name: Unit tests
        run: python -m pytest -q

      - name: Reproducibility smoke test
        run: python -m pytest -q tests/unit/test_seed_determinism.py

  planner-soak-trend:
    name: Planner Soak Trend Artifact
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]

      - name: Run planner soak (sync + async)
        run: |
          python scripts/soak_planner.py \
            --mode both \
            --requests 240 \
            --concurrency 24 \
            --timeout-seconds 20 \
            --persistence-backend sqlite \
            --sqlite-path .mars_mcp_runtime.soak.sqlite3 \
            --output data/processed/planner-soak-ci.json \
            --reset-runtime-state

      - name: Upload planner soak artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: planner-soak-ci
          path: data/processed/planner-soak-ci.json
          if-no-files-found: warn
